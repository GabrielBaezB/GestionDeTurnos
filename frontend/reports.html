<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroQrobo — Reportes</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(145deg, #0b0f1a, #1a1040, #0f172a);
            background-attachment: fixed;
            min-height: 100vh;
            color: #e2e8f0;
        }

        .brand-gradient {
            background: linear-gradient(135deg, #a78bfa, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi-label {
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        /* Custom Scrollbar for table */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .table-dark-glass {
            --bs-table-bg: transparent;
            --bs-table-color: #e2e8f0;
            --bs-table-border-color: rgba(255, 255, 255, 0.06);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark"
        style="background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(10px);">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                ⚡ <span class="brand-gradient">ZeroQrobo</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item"><a class="nav-link text-secondary" href="/kiosk">Kiosco</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="/monitor">Monitor</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="/clerk">Operador</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/reports">Reportes</a></li>
                    <li class="nav-item"><a class="btn btn-sm btn-outline-light rounded-pill px-3"
                            href="/admin">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="h2 fw-bold mb-1">📊 Dashboard de Métricas</h1>
                <p class="text-secondary mb-0">Rendimiento en tiempo real de la sucursal</p>
            </div>
            <div>
                <button class="btn btn-primary rounded-pill px-4" onclick="loadDashboard()">
                    <i class="bi bi-arrow-clockwise me-2"></i> Actualizar
                </button>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="row g-4 mb-5">
            <div class="col-6 col-md-3">
                <div class="glass-card h-100">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div class="bg-primary bg-opacity-10 p-2 rounded-3 text-primary">
                            <i class="bi bi-ticket-perforated fs-4"></i>
                        </div>
                        <div class="kpi-label">Tickets Totales</div>
                    </div>
                    <div class="kpi-value" id="total-tickets">-</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="glass-card h-100">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div class="bg-success bg-opacity-10 p-2 rounded-3 text-success">
                            <i class="bi bi-check-circle fs-4"></i>
                        </div>
                        <div class="kpi-label">Atendidos</div>
                    </div>
                    <div class="kpi-value" id="attended-tickets">-</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="glass-card h-100">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div class="bg-warning bg-opacity-10 p-2 rounded-3 text-warning">
                            <i class="bi bi-hourglass-split fs-4"></i>
                        </div>
                        <div class="kpi-label">En Espera</div>
                    </div>
                    <div class="kpi-value" id="waiting-tickets">-</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="glass-card h-100">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div class="bg-info bg-opacity-10 p-2 rounded-3 text-info">
                            <i class="bi bi-stopwatch fs-4"></i>
                        </div>
                        <div class="kpi-label">Espera Promedio</div>
                    </div>
                    <div class="d-flex align-items-baseline gap-2">
                        <div class="kpi-value" id="avg-wait">-</div>
                        <span class="text-secondary small">seg</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4">
            <!-- Wait Time Chart -->
            <div class="col-lg-8">
                <div class="glass-card h-100">
                    <h5 class="fw-bold mb-4 text-light">⏳ Tiempos de Espera por Hora</h5>
                    <div class="chart-container">
                        <canvas id="waitChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Operator Stats -->
            <div class="col-lg-4">
                <div class="glass-card h-100">
                    <h5 class="fw-bold mb-4 text-light">🏆 Ranking Operadores</h5>
                    <div class="table-responsive" style="max-height: 350px;">
                        <table class="table table-dark-glass align-middle">
                            <thead>
                                <tr>
                                    <th scope="col" class="text-secondary small fw-normal">OPERADOR</th>
                                    <th scope="col" class="text-end text-secondary small fw-normal">TICKETS</th>
                                </tr>
                            </thead>
                            <tbody id="operator-table-body">
                                <!-- JS content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/v1';
        let waitChart = null;

        // Chart.js global config for Dark Theme
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.06)';
        Chart.defaults.font.family = "'Outfit', sans-serif";

        async function loadDashboard() {
            try {
                const btn = document.querySelector('button[onclick="loadDashboard()"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Cargando...';

                const res = await fetch(`${API_URL}/reports/dashboard`);
                if (!res.ok) throw new Error('Error loading data');
                const data = await res.json();
                renderDashboard(data);

                btn.innerHTML = originalText;
            } catch (error) {
                console.error(error);
                alert('No se pudieron cargar los reportes. Asegúrate de que el backend esté actualizado.');
            }
        }

        function renderDashboard(data) {
            // KPIs
            animateValue("total-tickets", data.daily_stats.total_tickets);
            animateValue("attended-tickets", data.daily_stats.attended_tickets);
            animateValue("waiting-tickets", data.daily_stats.waiting_tickets);
            animateValue("avg-wait", Math.round(data.daily_stats.avg_wait_time_seconds));

            // Operator Table
            const tbody = document.getElementById('operator-table-body');
            tbody.innerHTML = '';
            if (data.operator_stats.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="text-center text-secondary py-4">Sin actividad hoy</td></tr>';
            } else {
                // Sort by tickets served desc
                data.operator_stats.sort((a, b) => b.tickets_served - a.tickets_served);

                data.operator_stats.forEach((op, index) => {
                    const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="fs-5">${medal}</span>
                                    <span class="fw-medium">${op.operator_name}</span>
                                </div>
                            </td>
                            <td class="text-end">
                                <span class="badge bg-primary bg-opacity-25 text-primary border border-primary border-opacity-25 rounded-pill px-3">
                                    ${op.tickets_served}
                                </span>
                            </td>
                        </tr>
                    `;
                });
            }

            // Wait Time Chart
            const ctx = document.getElementById('waitChart').getContext('2d');
            const labels = data.wait_times.map(d => d.hour);
            const values = data.wait_times.map(d => d.avg_uait_time);

            if (waitChart) waitChart.destroy();

            // Gradient for chart area
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(99, 102, 241, 0.5)'); // Indigo
            gradient.addColorStop(1, 'rgba(99, 102, 241, 0.0)');

            waitChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Tiempo de Espera (seg)',
                        data: values,
                        borderColor: '#6366f1',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#6366f1',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            padding: 10,
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.04)' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Simple number animation
        function animateValue(id, value) {
            const obj = document.getElementById(id);
            obj.innerHTML = value; // Simple set for now, can animate later
        }

        // Initial Load
        loadDashboard();
    </script>
</body>

</html>
