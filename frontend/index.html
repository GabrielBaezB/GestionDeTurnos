<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }} — Sistema de Gestión de Filas</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(145deg, #0b0f1a 0%, #1a1040 35%, #0f172a 70%, #0b0f1a 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .portal-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .brand-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #a78bfa 0%, #6366f1 35%, #ec4899 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 2.5rem 2rem;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            height: 100%;
        }

        .portal-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            color: white;
        }

        .portal-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 1rem;
        }

        .portal-card:hover.kiosk {
            border-color: #34d399;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(52, 211, 153, 0.12);
        }

        .portal-card:hover.monitor {
            border-color: #60a5fa;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(96, 165, 250, 0.12);
        }

        .portal-card:hover.clerk {
            border-color: #fbbf24;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(251, 191, 36, 0.12);
        }

        .portal-card:hover.admin {
            border-color: #a78bfa;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(167, 139, 250, 0.12);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }

        .animate-in-delay {
            animation: fadeInUp 0.7s ease 0.1s forwards;
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="portal-wrapper">
        <div class="text-center mb-5 animate-in">
            <h1 class="brand-title">⚡ {{ project_name }}</h1>
            <p class="text-secondary fs-5 mt-2">Sistema Inteligente de Gestión de Filas</p>
        </div>

        <div class="container animate-in-delay" style="max-width: 960px;">
            <div class="row g-4 justify-content-center">
                <div class="col-6 col-md-3">
                    <a href="/kiosk" class="portal-card kiosk d-block">
                        <span class="portal-icon">🎫</span>
                        <h5 class="fw-bold text-light">Kiosco</h5>
                        <p class="text-secondary small mb-0">Emitir turnos</p>
                    </a>
                </div>
                <div class="col-6 col-md-3">
                    <a href="/monitor" class="portal-card monitor d-block">
                        <span class="portal-icon">📺</span>
                        <h5 class="fw-bold text-light">Monitor</h5>
                        <p class="text-secondary small mb-0">Pantalla pública</p>
                    </a>
                </div>
                <div class="col-6 col-md-3">
                    <a href="/clerk" class="portal-card clerk d-block">
                        <span class="portal-icon">👨‍💼</span>
                        <h5 class="fw-bold text-light">Operador</h5>
                        <p class="text-secondary small mb-0">Panel de atención</p>
                    </a>
                </div>
                <div class="col-6 col-md-3">
                    <a href="/admin" class="portal-card admin d-block">
                        <span class="portal-icon">⚙️</span>
                        <h5 class="fw-bold text-light">Admin</h5>
                        <p class="text-secondary small mb-0">Configurar sistema</p>
                    </a>
                </div>
                <div class="col-6 col-md-3">
                    <a href="/reports" class="portal-card reports d-block">
                        <span class="portal-icon">📊</span>
                        <h5 class="fw-bold text-light">Reportes</h5>
                        <p class="text-secondary small mb-0">Dashboard BI</p>
                    </a>
                </div>
            </div>
        </div>

        <footer class="mt-5 text-center text-secondary small"
            style="animation: fadeInUp 0.8s ease 0.3s forwards; opacity: 0;">
            {{ project_name }} v1.0 — Powered by FastAPI + Docker
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/config.js?v=2"></script>
</body>

</html>
