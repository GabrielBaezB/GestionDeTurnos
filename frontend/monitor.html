<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroQrobo — Monitor de Turnos</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0b0f1a;
            overflow: hidden;
            cursor: none;
            margin: 0;
        }

        .monitor-layout {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            height: 100vh;
        }

        /* ── Left: Now Serving ── */
        .now-serving {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 3rem;
            position: relative;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(167, 139, 250, 0.06) 0%, transparent 50%);
        }

        .serving-label {
            font-size: clamp(1.5rem, 3vw, 3rem);
            font-weight: 300;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        .serving-number {
            font-size: clamp(6rem, 15vw, 14rem);
            font-weight: 800;
            line-height: 1;
            color: #a78bfa;
            text-shadow:
                0 0 40px rgba(167, 139, 250, 0.5),
                0 0 80px rgba(167, 139, 250, 0.3),
                0 0 120px rgba(167, 139, 250, 0.15);
            animation: glow 3s ease-in-out infinite;
            margin: 1rem 0;
        }

        .serving-module {
            font-size: clamp(1.8rem, 4vw, 4rem);
            font-weight: 700;
            color: #f1f5f9;
        }

        @keyframes glow {

            0%,
            100% {
                text-shadow: 0 0 20px rgba(167, 139, 250, 0.4), 0 0 60px rgba(167, 139, 250, 0.2);
            }

            50% {
                text-shadow: 0 0 40px rgba(167, 139, 250, 0.6), 0 0 100px rgba(167, 139, 250, 0.4);
            }
        }

        @keyframes ticketFlash {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .flash {
            animation: ticketFlash 0.6s ease-out;
        }

        .footer-info {
            margin-top: auto;
            padding-top: 2rem;
            color: #64748b;
        }

        /* ── Right: Lists ── */
        .lists-panel {
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.2);
        }

        .list-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-section+.list-section {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .list-header {
            padding: 1.25rem 1.5rem;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .list-body {
            flex: 1;
            overflow-y: auto;
        }

        .list-body::-webkit-scrollbar {
            width: 4px;
        }

        .list-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .list-item .num {
            font-size: clamp(1.1rem, 2vw, 1.6rem);
            font-weight: 700;
        }

        .list-item .meta {
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            color: #94a3b8;
        }

        .list-empty {
            padding: 2rem;
            text-align: center;
            color: #475569;
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .monitor-layout {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
            }

            .now-serving {
                min-height: 50vh;
                padding: 2rem;
            }

            .lists-panel {
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
            }
        }

        @media (min-width: 1920px) {
            .serving-number {
                font-size: 16rem;
            }

            .serving-module {
                font-size: 5rem;
            }

            .list-item {
                padding: 1.5rem 2rem;
            }

            .list-item .num {
                font-size: 2rem;
            }
        }

        @media (min-width: 2560px) {
            .serving-number {
                font-size: 22rem;
            }

            .serving-module {
                font-size: 6rem;
            }

            .serving-label {
                font-size: 3.5rem;
            }

            .list-item {
                padding: 2rem 2.5rem;
            }

            .list-item .num {
                font-size: 2.8rem;
            }

            .list-item .meta {
                font-size: 1.5rem;
            }

            .list-header {
                padding: 2rem;
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <div class="monitor-layout">
        <!-- Left: Now Serving -->
        <div class="now-serving">
            <div class="serving-label">Llamando a</div>
            <div id="current-ticket" class="serving-number">---</div>
            <div id="current-module" class="serving-module text-light">---</div>

            <div class="footer-info text-center">
                <p class="mb-1">Por favor acérquese al módulo indicado</p>
                <p class="fw-bold fs-5" style="color: #64748b;">⚡ ZeroQrobo</p>
            </div>
        </div>

        <!-- Right: Lists -->
        <div class="lists-panel">
            <div class="list-section">
                <div class="list-header text-success"><i class="bi bi-circle-fill me-2"
                        style="font-size: 0.5rem; vertical-align: middle;"></i>Atendiendo</div>
                <div id="serving-list" class="list-body">
                    <div class="list-empty">Sin actividad</div>
                </div>
            </div>
            <div class="list-section">
                <div class="list-header text-warning"><i class="bi bi-hourglass-split me-2"></i>En Espera</div>
                <div id="waiting-list" class="list-body">
                    <div class="list-empty">No hay tickets</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api/v1';
        let lastCalledTicket = null;

        function renderMonitor(data) {
            // Main Display
            if (data.serving && data.serving.length > 0) {
                const current = data.serving[0];
                const display = document.getElementById('current-ticket');

                if (current.number !== lastCalledTicket) {
                    lastCalledTicket = current.number;
                    display.classList.remove('flash');
                    void display.offsetWidth;
                    display.classList.add('flash');
                }

                display.textContent = current.number;
                document.getElementById('current-module').textContent = `Módulo ${current.served_by_module_id || '?'}`;
            } else {
                document.getElementById('current-ticket').textContent = '---';
                document.getElementById('current-module').textContent = '---';
                lastCalledTicket = null;
            }

            // Serving List
            const servingEl = document.getElementById('serving-list');
            if (!data.serving || data.serving.length === 0) {
                servingEl.innerHTML = '<div class="list-empty">Sin actividad</div>';
            } else {
                servingEl.innerHTML = '';
                data.serving.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<span class="num text-success">${t.number}</span><span class="meta">Módulo ${t.served_by_module_id || '?'}</span>`;
                    servingEl.appendChild(div);
                });
            }

            // Waiting List
            const waitingEl = document.getElementById('waiting-list');
            if (!data.waiting || data.waiting.length === 0) {
                waitingEl.innerHTML = '<div class="list-empty">No hay tickets en espera</div>';
            } else {
                waitingEl.innerHTML = '';
                data.waiting.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<span class="num text-secondary">${t.number}</span><span class="meta">En espera</span>`;
                    waitingEl.appendChild(div);
                });
            }
        }

        // ─── SSE Connection ───
        let es = null;
        let lastHeartbeat = Date.now();
        // Visual indicator (optional, small dot in corner)
        const statusDot = document.createElement('div');
        statusDot.style.cssText = "position:fixed;bottom:10px;right:10px;width:10px;height:10px;border-radius:50%;background:#ef4444;transition:background 0.3s;z-index:9999;";
        document.body.appendChild(statusDot);

        function connectSSE() {
            if (es) es.close();
            es = new EventSource(`${API_URL}/tickets/stream`);
            statusDot.style.background = "#eab308"; // connecting (yellow)

            es.onopen = () => {
                console.log('SSE Connected');
                statusDot.style.background = "#22c55e"; // connected (green)
                lastHeartbeat = Date.now();
            };

            es.onmessage = (e) => {
                lastHeartbeat = Date.now();
                try {
                    const payload = JSON.parse(e.data);
                    if (payload.type === 'heartbeat') return;
                    renderMonitor(payload.data);
                } catch (err) { console.error('SSE parse error', err); }
            };

            es.onerror = () => {
                console.warn('SSE disconnected, reconnecting in 3s…');
                statusDot.style.background = "#ef4444"; // error (red)
                es.close();
                // setTimeout(connectSSE, 3000); // Watchdog handles reconnection now
            };
        }

        // Watchdog: Check connection health every 5s
        setInterval(() => {
            const now = Date.now();
            // 45s timeout (backend sends heartbeat every 30s)
            if (now - lastHeartbeat > 45000) {
                console.warn('Watchdog: No heartbeat, forcing reconnect...');
                connectSSE();
                lastHeartbeat = now; // Reset to avoid loop
            }
        }, 5000);

        // Initial load via REST, then switch to SSE
        async function initialLoad() {
            try {
                const res = await fetch(`${API_URL}/tickets/monitor`);
                if (res.ok) renderMonitor(await res.json());
            } catch (e) { console.error(e); }
            connectSSE();
        }

        initialLoad();
    </script>
</body>

</html>
